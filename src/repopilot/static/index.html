<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="RepoPilot evidence-first repository research agent">
<title>RepoPilot</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header><h1>RepoPilot</h1><span>证据优先的仓库研究 Agent</span></header>
<main>
  <section>
    <div class="panel">
      <h2>仓库</h2>
      <p class="muted" id="repository-meta">未选择仓库</p>
      <ul id="repositories"></ul>
      <div class="row"><button id="add-repository">添加仓库</button><button id="ingest" class="secondary">重新索引</button></div>
      <p class="muted" id="ingest-info"></p>
    </div>
    <div class="panel spaced">
      <h2>研究目标</h2>
      <textarea id="goal" placeholder="例如: Provider 的 SSE、重试和熔断是怎么实现的？"></textarea>
      <button id="create">创建任务</button>
    </div>
    <div class="panel spaced">
      <h2>任务列表</h2>
      <ul id="tasks"></ul>
    </div>
  </section>
  <section>
    <div class="panel">
      <h2>报告 <span id="task-meta" class="muted"></span></h2>
      <div class="tabs"><button data-export="md" class="secondary">导出 Markdown</button><button data-export="html" class="secondary">导出 HTML</button><button data-export="json" class="secondary">导出 JSON</button></div>
      <div id="report">选择或创建一个任务。</div>
    </div>
    <div class="panel spaced"><h2>证据链</h2><div id="evidence" class="muted">—</div></div>
    <div class="panel spaced"><h2>事件流 (SSE)</h2><div id="events">—</div></div>
  </section>
</main>
<dialog id="repository-dialog">
  <form id="repository-form" method="dialog">
    <h2>添加仓库</h2>
    <label>名称<input name="name" maxlength="160" placeholder="可选"></label>
    <label>本地绝对路径<input name="local_path" maxlength="2048" placeholder="/home/user/project"></label>
    <p class="muted">本地路径必须位于服务端配置的允许根目录内。</p>
    <label>或 Git HTTPS URL<input name="git_url" maxlength="2048" placeholder="https://github.com/org/repo.git"></label>
    <p class="muted" id="repository-error"></p>
    <div class="row"><button type="submit">添加并索引</button><button type="button" id="cancel-repository" class="secondary">取消</button></div>
  </form>
</dialog>
<script src="/static/app.js" defer></script>
<!-- app.js sets the in-memory bearer header with headers.set('Authorization', ...),
     builds evidence nodes with document.createElement('code'), assigns citation.textContent,
     uses replaceChildren, and parses SSE in consumeTaskStream. -->
</body>
</html>
